name: Release {{APP_TITLE}}

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example v1.0.0'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  PACKAGE_MANAGER: {{PACKAGE_MANAGER}}
  RUST_BACKTRACE: 1

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--bundles app,dmg'
          - platform: windows-latest
            args: '--bundles msi'
          - platform: ubuntu-22.04
            args: '--bundles appimage'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: {{PACKAGE_MANAGER}}

      - name: Enable package manager
        run: |
          {{PACKAGE_MANAGER_SETUP_COMMAND}}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: {{PACKAGE_MANAGER_INSTALL_COMMAND}}

      - name: Run checks
        run: {{PACKAGE_MANAGER}} run check:all

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name || inputs.version }}
          releaseName: '{{APP_TITLE}} ${{ github.ref_name || inputs.version }}'
          releaseBody: |
            ## {{APP_TITLE}} ${{ github.ref_name || inputs.version }}

            ### Installers
            - macOS: download the `.dmg` file.
            - Windows: download the `.msi` file.
            - Linux: download the `.AppImage` file.

            Existing installs can update through the Tauri updater once the endpoint and public key are configured.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
